<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar Lander</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #hud {
            display: flex;
            gap: 30px;
            color: #4ade80;
            font-size: 18px;
            margin-bottom: 10px;
        }
        canvas {
            border: 4px solid #4ade80;
            border-radius: 4px;
            background: #000;
        }
        #instructions {
            color: #888;
            margin-top: 12px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div>Fuel: <span id="fuel">150</span></div>
        <div>Speed: <span id="speed">0.0</span></div>
        <div>Score: <span id="score">0</span></div>
        <div>Status: <span id="status">Land on a pad</span></div>
    </div>
    <canvas id="game" width="640" height="480"></canvas>
    <div id="instructions">Left/Right or A/D to rotate, Up or W to thrust. Land gently and level on a highlighted pad. Wider pads are easier but worth less.</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const fuelEl = document.getElementById('fuel');
        const speedEl = document.getElementById('speed');
        const scoreEl = document.getElementById('score');
        const statusEl = document.getElementById('status');

        const GRAVITY = 0.02;
        const THRUST = 0.05;
        const ROTATION_SPEED = 0.05;
        const FUEL_MAX = 150;
        const FUEL_USE = 0.4;
        const MAX_LANDING_SPEED = 2.5;
        const MAX_LANDING_ANGLE = 0.3;
        const SHIP_SIZE = 14;

        let ship, terrain, particles, score, gameOver, landed, keys;

        function normalizeAngle(a) {
            a = a % (Math.PI * 2);
            if (a > Math.PI) a -= Math.PI * 2;
            if (a < -Math.PI) a += Math.PI * 2;
            return a;
        }

        function generateTerrain() {
            const segments = 40;
            const segWidth = canvas.width / segments;
            const points = [];
            let height = canvas.height * 0.65;
            for (let i = 0; i <= segments; i++) {
                height += (Math.random() - 0.5) * 36;
                height = Math.max(canvas.height * 0.45, Math.min(canvas.height * 0.88, height));
                points.push({ x: i * segWidth, y: height });
            }

            const pads = [];
            const used = new Set();
            const multipliers = [3, 2, 1];
            for (let p = 0; p < 3; p++) {
                let idx;
                let tries = 0;
                do {
                    idx = 3 + Math.floor(Math.random() * (segments - 6));
                    tries++;
                } while (tries < 30 && [...used].some(u => Math.abs(u - idx) < 3));
                used.add(idx);
                points[idx + 1].y = points[idx].y;
                pads.push({ x1: points[idx].x, x2: points[idx + 1].x, y: points[idx].y, multiplier: multipliers[p] });
            }

            return { points, pads };
        }

        function getTerrainHeightAt(x) {
            const pts = terrain.points;
            for (let i = 0; i < pts.length - 1; i++) {
                if (x >= pts[i].x && x <= pts[i + 1].x) {
                    const t = (x - pts[i].x) / (pts[i + 1].x - pts[i].x);
                    return pts[i].y + (pts[i + 1].y - pts[i].y) * t;
                }
            }
            return canvas.height;
        }

        function init() {
            ship = { x: canvas.width / 2, y: 60, vx: 0, vy: 0, angle: 0, fuel: FUEL_MAX, thrusting: false };
            terrain = generateTerrain();
            particles = [];
            score = 0;
            gameOver = false;
            landed = false;
            keys = {};
            scoreEl.textContent = score;
            statusEl.textContent = 'Land on a pad';
            updateHud();
        }

        function updateHud() {
            fuelEl.textContent = Math.round(ship.fuel);
            speedEl.textContent = Math.hypot(ship.vx, ship.vy).toFixed(1);
        }

        function spawnExplosion(x, y) {
            for (let i = 0; i < 30; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 0.5 + Math.random() * 3;
                particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 30 + Math.random() * 20 });
            }
        }

        function resolveLanding(terrainY) {
            ship.y = terrainY - SHIP_SIZE / 2;
            const speed = Math.hypot(ship.vx, ship.vy);
            const tilt = Math.abs(normalizeAngle(ship.angle));
            const pad = terrain.pads.find(p => ship.x >= p.x1 && ship.x <= p.x2);

            gameOver = true;
            if (pad && speed <= MAX_LANDING_SPEED && tilt <= MAX_LANDING_ANGLE) {
                landed = true;
                const bonus = Math.round(pad.multiplier * 100 + ship.fuel * 2);
                score = bonus;
                scoreEl.textContent = score;
                statusEl.textContent = `Landed safely! +${bonus}`;
            } else {
                landed = false;
                if (!pad) statusEl.textContent = 'Crashed! Missed the pad';
                else if (speed > MAX_LANDING_SPEED) statusEl.textContent = 'Crashed! Too fast';
                else statusEl.textContent = 'Crashed! Too tilted';
                spawnExplosion(ship.x, ship.y);
            }
        }

        function update() {
            if (gameOver) {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx; p.y += p.vy; p.vy += GRAVITY * 0.5; p.life--;
                    if (p.life <= 0) particles.splice(i, 1);
                }
                return;
            }

            if (keys['ArrowLeft'] || keys['a']) ship.angle -= ROTATION_SPEED;
            if (keys['ArrowRight'] || keys['d']) ship.angle += ROTATION_SPEED;

            ship.thrusting = (keys['ArrowUp'] || keys['w']) && ship.fuel > 0;
            if (ship.thrusting) {
                ship.vx += Math.sin(ship.angle) * THRUST;
                ship.vy -= Math.cos(ship.angle) * THRUST;
                ship.fuel = Math.max(0, ship.fuel - FUEL_USE);
            }

            ship.vy += GRAVITY;
            ship.x += ship.vx;
            ship.y += ship.vy;

            if (ship.x < 10) { ship.x = 10; ship.vx = 0; }
            if (ship.x > canvas.width - 10) { ship.x = canvas.width - 10; ship.vx = 0; }

            const terrainY = getTerrainHeightAt(ship.x);
            if (ship.y + SHIP_SIZE / 2 >= terrainY) {
                resolveLanding(terrainY);
            }

            updateHud();
        }
    </script>
</body>
</html>
