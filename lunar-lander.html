<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar Lander</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #hud {
            display: flex;
            gap: 30px;
            color: #4ade80;
            font-size: 18px;
            margin-bottom: 10px;
        }
        canvas {
            border: 4px solid #4ade80;
            border-radius: 4px;
            background: #000;
        }
        #instructions {
            color: #888;
            margin-top: 12px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div>Fuel: <span id="fuel">150</span></div>
        <div>Speed: <span id="speed">0.0</span></div>
        <div>Score: <span id="score">0</span></div>
        <div>Status: <span id="status">Land on a pad</span></div>
    </div>
    <canvas id="game" width="640" height="480"></canvas>
    <div id="instructions">Left/Right or A/D to rotate, Up or W to thrust. Land gently and level on a highlighted pad. Wider pads are easier but worth less.</div>

    <script>
    </script>
</body>
</html>
