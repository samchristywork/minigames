<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless Runner</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #hud {
            display: flex;
            gap: 30px;
            color: #4ade80;
            font-size: 18px;
            margin-bottom: 10px;
        }
        canvas {
            border: 4px solid #4ade80;
            border-radius: 4px;
            cursor: pointer;
        }
        #instructions {
            color: #888;
            margin-top: 12px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div>Score: <span id="score">0</span></div>
        <div>Best: <span id="best">0</span></div>
        <div>Status: <span id="status">Get ready!</span></div>
    </div>
    <canvas id="game" width="640" height="220"></canvas>
    <div id="instructions">Space / Up / click to jump. Hold Down to duck under birds. Avoid the cacti!</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const statusEl = document.getElementById('status');

        const GROUND_Y = 170;
        const GRAVITY = 0.6;
        const JUMP_VELOCITY = -11;
        const PLAYER_X = 60;
        const PLAYER_WIDTH = 34;
        const PLAYER_HEIGHT = 42;
        const DUCK_HEIGHT = 24;
        const BASE_SPEED = 5;
        const MAX_SPEED = 13;
        const STORAGE_KEY = 'endlessRunnerHighScore';

        let highScore = 0;
        try {
            highScore = parseInt(localStorage.getItem(STORAGE_KEY), 10) || 0;
        } catch (e) {
            highScore = 0;
        }
        bestEl.textContent = highScore;

        let player, obstacles, obstacleTimer, score, speed, groundScroll, gameOver, started, animTick;

        function scheduleNextObstacle() {
            const minGap = 280;
            const extraGap = Math.random() * 220;
            obstacleTimer = (minGap + extraGap) / speed;
        }

        function reset() {
            player = { y: GROUND_Y - PLAYER_HEIGHT, vy: 0, jumping: false, ducking: false };
            obstacles = [];
            score = 0;
            speed = BASE_SPEED;
            groundScroll = 0;
            gameOver = false;
            started = false;
            animTick = 0;
            scoreEl.textContent = '0';
            statusEl.textContent = 'Get ready!';
            scheduleNextObstacle();
        }

        function playerHitbox() {
            if (player.ducking && !player.jumping) {
                return { x: PLAYER_X - 6, y: GROUND_Y - DUCK_HEIGHT, width: PLAYER_WIDTH + 12, height: DUCK_HEIGHT };
            }
            return { x: PLAYER_X, y: player.y, width: PLAYER_WIDTH, height: PLAYER_HEIGHT };
        }

        function jump() {
            if (!started) started = true;
            if (!player.jumping && !gameOver) {
                player.jumping = true;
                player.vy = JUMP_VELOCITY;
            }
        }

        function setDuck(state) {
            if (!started) started = true;
            player.ducking = state && !player.jumping;
        }

        function spawnObstacle() {
            const roll = Math.random();
            let obstacle;
            if (roll < 0.4) obstacle = { type: 'cactus-small', width: 18, height: 32 };
            else if (roll < 0.75) obstacle = { type: 'cactus-large', width: 30, height: 46 };
            else obstacle = { type: 'bird', width: 34, height: 22 };

            obstacle.x = canvas.width + 20;
            obstacle.y = obstacle.type === 'bird'
                ? GROUND_Y - DUCK_HEIGHT - obstacle.height - 4
                : GROUND_Y - obstacle.height;
            obstacles.push(obstacle);
            scheduleNextObstacle();
        }

        function checkCollision(a, o) {
            return a.x < o.x + o.width && a.x + a.width > o.x && a.y < o.y + o.height && a.y + a.height > o.y;
        }

        function endGame() {
            gameOver = true;
            const finalScore = Math.floor(score);
            if (finalScore > highScore) {
                highScore = finalScore;
                bestEl.textContent = highScore;
                try { localStorage.setItem(STORAGE_KEY, String(highScore)); } catch (e) { /* storage unavailable */ }
            }
            statusEl.textContent = 'Game over';
        }

        function update() {
            if (!started || gameOver) return;
            animTick++;

            speed = Math.min(MAX_SPEED, BASE_SPEED + score * 0.0015);
            score += speed * 0.05;
            scoreEl.textContent = Math.floor(score);
            groundScroll += speed;
            statusEl.textContent = 'Running!';

            if (player.jumping) {
                player.vy += GRAVITY;
                player.y += player.vy;
                if (player.y >= GROUND_Y - PLAYER_HEIGHT) {
                    player.y = GROUND_Y - PLAYER_HEIGHT;
                    player.jumping = false;
                    player.vy = 0;
                }
            } else {
                player.y = GROUND_Y - PLAYER_HEIGHT;
            }

            obstacleTimer--;
            if (obstacleTimer <= 0) spawnObstacle();

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const o = obstacles[i];
                o.x -= speed;
                if (o.x + o.width < 0) obstacles.splice(i, 1);
            }

            const hitbox = playerHitbox();
            for (const o of obstacles) {
                if (checkCollision(hitbox, o)) { endGame(); return; }
            }
        }

        function skyColors() {
            const cycle = Math.floor(score / 500) % 2;
            return cycle === 0
                ? { sky: '#87ceeb', ground: '#5a3a1a', fg: '#333' }
                : { sky: '#0a1128', ground: '#1a1a2e', fg: '#eee' };
        }

        function drawGround(colors) {
            ctx.strokeStyle = colors.fg;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, GROUND_Y);
            ctx.lineTo(canvas.width, GROUND_Y);
            ctx.stroke();

            const dashSpacing = 40;
            const offset = groundScroll % dashSpacing;
            ctx.lineWidth = 3;
            for (let x = -offset; x < canvas.width; x += dashSpacing) {
                ctx.beginPath();
                ctx.moveTo(x, GROUND_Y + 6);
                ctx.lineTo(x + 16, GROUND_Y + 6);
                ctx.stroke();
            }
        }

        function drawPlayer(colors) {
            const hitbox = playerHitbox();
            ctx.fillStyle = colors.fg;
            ctx.beginPath();
            ctx.roundRect(hitbox.x, hitbox.y, hitbox.width, hitbox.height, 6);
            ctx.fill();

            ctx.fillStyle = colors.sky;
            ctx.beginPath();
            ctx.arc(hitbox.x + hitbox.width * 0.75, hitbox.y + hitbox.height * 0.25, 3, 0, Math.PI * 2);
            ctx.fill();

            if (!player.jumping && started) {
                const legPhase = Math.floor(animTick / 6) % 2;
                ctx.strokeStyle = colors.fg;
                ctx.lineWidth = 4;
                ctx.beginPath();
                if (legPhase === 0) {
                    ctx.moveTo(hitbox.x + 6, hitbox.y + hitbox.height);
                    ctx.lineTo(hitbox.x + 2, hitbox.y + hitbox.height + 8);
                    ctx.moveTo(hitbox.x + hitbox.width - 6, hitbox.y + hitbox.height);
                    ctx.lineTo(hitbox.x + hitbox.width - 2, hitbox.y + hitbox.height + 4);
                } else {
                    ctx.moveTo(hitbox.x + 6, hitbox.y + hitbox.height);
                    ctx.lineTo(hitbox.x + 2, hitbox.y + hitbox.height + 4);
                    ctx.moveTo(hitbox.x + hitbox.width - 6, hitbox.y + hitbox.height);
                    ctx.lineTo(hitbox.x + hitbox.width - 2, hitbox.y + hitbox.height + 8);
                }
                ctx.stroke();
            }
        }

        function drawObstacle(o, colors) {
            if (o.type === 'bird') {
                const flap = Math.floor(animTick / 8) % 2 === 0 ? -8 : 8;
                ctx.strokeStyle = colors.fg;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(o.x, o.y + o.height / 2);
                ctx.lineTo(o.x + o.width / 2, o.y + o.height / 2 + flap);
                ctx.lineTo(o.x + o.width, o.y + o.height / 2);
                ctx.stroke();
                ctx.fillStyle = colors.fg;
                ctx.beginPath();
                ctx.ellipse(o.x + o.width / 2, o.y + o.height / 2, o.width * 0.3, o.height * 0.25, 0, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.fillStyle = '#3a9d4f';
                ctx.fillRect(o.x, o.y, o.width, o.height);
                ctx.strokeStyle = colors.fg;
                ctx.lineWidth = 1;
                ctx.strokeRect(o.x, o.y, o.width, o.height);
                const spikes = o.type === 'cactus-large' ? 3 : 2;
                for (let i = 0; i < spikes; i++) {
                    const sx = o.x + (i + 0.5) * (o.width / spikes);
                    ctx.beginPath();
                    ctx.moveTo(sx - 4, o.y);
                    ctx.lineTo(sx, o.y - 6);
                    ctx.lineTo(sx + 4, o.y);
                    ctx.fill();
                }
            }
        }

        function draw() {
            const colors = skyColors();
            ctx.fillStyle = colors.sky;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawGround(colors);
            for (const o of obstacles) drawObstacle(o, colors);
            drawPlayer(colors);

            if (!started) {
                ctx.fillStyle = colors.fg;
                ctx.font = 'bold 18px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Press Space or click to start', canvas.width / 2, 60);
            }

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#f44';
                ctx.font = 'bold 32px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 15);
                ctx.fillStyle = '#fff';
                ctx.font = '18px Arial';
                ctx.fillText(`Score: ${Math.floor(score)}   Best: ${highScore}`, canvas.width / 2, canvas.height / 2 + 20);
                ctx.font = '14px Arial';
                ctx.fillStyle = '#aaa';
                ctx.fillText('Press Space or click to try again', canvas.width / 2, canvas.height / 2 + 48);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function handleAction() {
            if (gameOver) { reset(); return; }
            jump();
        }

        canvas.addEventListener('click', handleAction);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.key === 'ArrowUp') {
                handleAction();
                e.preventDefault();
            } else if (e.key === 'ArrowDown') {
                setDuck(true);
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowDown') setDuck(false);
        });

        reset();
        gameLoop();
    </script>
</body>
</html>
