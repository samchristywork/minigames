<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Runner</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #hud {
            display: flex;
            gap: 30px;
            color: #4ade80;
            font-size: 18px;
            margin-bottom: 10px;
        }
        canvas {
            border: 4px solid #4ade80;
            border-radius: 4px;
            background: #000;
        }
        #instructions {
            color: #888;
            margin-top: 12px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div>Time: <span id="timer">0.0</span>s</div>
        <div>Find the green marker on the map</div>
    </div>
    <canvas id="game" width="640" height="400"></canvas>
    <div id="instructions">W/S or Up/Down to move, A/D or Left/Right to turn. A fresh random maze is generated every time you reach the exit.</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const timerEl = document.getElementById('timer');
        const SCREEN_W = canvas.width, SCREEN_H = canvas.height;

        const CELLS_W = 15, CELLS_H = 15;
        const GRID_W = CELLS_W * 2 + 1, GRID_H = CELLS_H * 2 + 1;
        const FOV = Math.PI / 3;
        const MOVE_SPEED = 0.06;
        const ROTATE_SPEED = 0.045;
        const PLAYER_RADIUS = 0.2;

        let grid, exitGridX, exitGridY, player, won, elapsedMs, keys, lastTime;

        function generateMaze(w, h) {
            const visited = Array.from({ length: h }, () => new Array(w).fill(false));
            const g = Array.from({ length: h * 2 + 1 }, () => new Array(w * 2 + 1).fill(1));

            for (let cy = 0; cy < h; cy++) {
                for (let cx = 0; cx < w; cx++) g[cy * 2 + 1][cx * 2 + 1] = 0;
            }

            const stack = [{ x: 0, y: 0 }];
            visited[0][0] = true;
            const dirs = [{ dx: 0, dy: -1 }, { dx: 0, dy: 1 }, { dx: -1, dy: 0 }, { dx: 1, dy: 0 }];

            while (stack.length > 0) {
                const current = stack[stack.length - 1];
                const options = [];
                for (const d of dirs) {
                    const nx = current.x + d.dx, ny = current.y + d.dy;
                    if (nx >= 0 && nx < w && ny >= 0 && ny < h && !visited[ny][nx]) {
                        options.push({ x: nx, y: ny, dx: d.dx, dy: d.dy });
                    }
                }
                if (options.length === 0) { stack.pop(); continue; }
                const next = options[Math.floor(Math.random() * options.length)];
                const wallX = current.x * 2 + 1 + next.dx;
                const wallY = current.y * 2 + 1 + next.dy;
                g[wallY][wallX] = 0;
                visited[next.y][next.x] = true;
                stack.push({ x: next.x, y: next.y });
            }

            return g;
        }

        function isWallAt(x, y) {
            const gx = Math.floor(x), gy = Math.floor(y);
            if (gx < 0 || gx >= GRID_W || gy < 0 || gy >= GRID_H) return true;
            return grid[gy][gx] === 1;
        }

        function tryMovePlayer(dx, dy) {
            const r = PLAYER_RADIUS;
            const newX = player.x + dx;
            const xSign = Math.sign(dx);
            if (!isWallAt(newX + xSign * r, player.y - r) && !isWallAt(newX + xSign * r, player.y + r)) {
                player.x = newX;
            }
            const newY = player.y + dy;
            const ySign = Math.sign(dy);
            if (!isWallAt(player.x - r, newY + ySign * r) && !isWallAt(player.x + r, newY + ySign * r)) {
                player.y = newY;
            }
        }

        function castRay(px, py, rayDirX, rayDirY) {
            let mapX = Math.floor(px), mapY = Math.floor(py);
            const deltaDistX = rayDirX === 0 ? 1e30 : Math.abs(1 / rayDirX);
            const deltaDistY = rayDirY === 0 ? 1e30 : Math.abs(1 / rayDirY);

            let stepX, sideDistX;
            if (rayDirX < 0) { stepX = -1; sideDistX = (px - mapX) * deltaDistX; }
            else { stepX = 1; sideDistX = (mapX + 1 - px) * deltaDistX; }

            let stepY, sideDistY;
            if (rayDirY < 0) { stepY = -1; sideDistY = (py - mapY) * deltaDistY; }
            else { stepY = 1; sideDistY = (mapY + 1 - py) * deltaDistY; }

            let side = 0, hit = false, guard = 0;
            while (!hit && guard < 128) {
                if (sideDistX < sideDistY) { sideDistX += deltaDistX; mapX += stepX; side = 0; }
                else { sideDistY += deltaDistY; mapY += stepY; side = 1; }
                if (mapX < 0 || mapX >= GRID_W || mapY < 0 || mapY >= GRID_H) hit = true;
                else if (grid[mapY][mapX] === 1) hit = true;
                guard++;
            }

            let rawDist;
            if (side === 0) rawDist = (mapX - px + (1 - stepX) / 2) / rayDirX;
            else rawDist = (mapY - py + (1 - stepY) / 2) / rayDirY;

            return { dist: Math.max(rawDist, 0.0001), side };
        }

        function wallColor(dist, side) {
            const brightness = Math.max(0.12, 1 - dist / 14);
            const base = side === 1 ? [56, 140, 90] : [74, 222, 128];
            return `rgb(${Math.floor(base[0] * brightness)},${Math.floor(base[1] * brightness)},${Math.floor(base[2] * brightness)})`;
        }

        function handleInput() {
            if (keys['a'] || keys['ArrowLeft']) player.angle -= ROTATE_SPEED;
            if (keys['d'] || keys['ArrowRight']) player.angle += ROTATE_SPEED;

            let dx = 0, dy = 0;
            if (keys['w'] || keys['ArrowUp']) { dx += Math.cos(player.angle) * MOVE_SPEED; dy += Math.sin(player.angle) * MOVE_SPEED; }
            if (keys['s'] || keys['ArrowDown']) { dx -= Math.cos(player.angle) * MOVE_SPEED; dy -= Math.sin(player.angle) * MOVE_SPEED; }
            if (dx !== 0 || dy !== 0) tryMovePlayer(dx, dy);
        }

        function update(dt) {
            if (won) return;
            elapsedMs += dt;
            handleInput();
            if (Math.floor(player.x) === exitGridX && Math.floor(player.y) === exitGridY) {
                won = true;
            }
        }

        function draw3D() {
            ctx.fillStyle = '#0d1620';
            ctx.fillRect(0, 0, SCREEN_W, SCREEN_H / 2);
            ctx.fillStyle = '#141414';
            ctx.fillRect(0, SCREEN_H / 2, SCREEN_W, SCREEN_H / 2);

            for (let col = 0; col < SCREEN_W; col++) {
                const rayAngle = player.angle - FOV / 2 + (col / SCREEN_W) * FOV;
                const rayDirX = Math.cos(rayAngle), rayDirY = Math.sin(rayAngle);
                const hitResult = castRay(player.x, player.y, rayDirX, rayDirY);
                const correctedDist = Math.max(0.0001, hitResult.dist * Math.cos(rayAngle - player.angle));
                const lineHeight = Math.min(SCREEN_H * 3, SCREEN_H / correctedDist);
                const drawStart = Math.max(0, SCREEN_H / 2 - lineHeight / 2);
                const drawEnd = Math.min(SCREEN_H, SCREEN_H / 2 + lineHeight / 2);
                ctx.fillStyle = wallColor(correctedDist, hitResult.side);
                ctx.fillRect(col, drawStart, 1, drawEnd - drawStart);
            }
        }

        function drawMinimap() {
            const mmSize = 150;
            const cellSize = mmSize / GRID_W;
            const ox = SCREEN_W - mmSize - 10, oy = 10;

            ctx.fillStyle = 'rgba(0,0,0,0.55)';
            ctx.fillRect(ox - 4, oy - 4, mmSize + 8, mmSize + 8);

            for (let y = 0; y < GRID_H; y++) {
                for (let x = 0; x < GRID_W; x++) {
                    ctx.fillStyle = grid[y][x] === 1 ? '#1a3a24' : '#0a0a14';
                    ctx.fillRect(ox + x * cellSize, oy + y * cellSize, cellSize + 0.5, cellSize + 0.5);
                }
            }

            ctx.fillStyle = '#4ade80';
            ctx.fillRect(ox + exitGridX * cellSize, oy + exitGridY * cellSize, cellSize + 0.5, cellSize + 0.5);

            const pxm = ox + player.x * cellSize, pym = oy + player.y * cellSize;
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(pxm, pym);
            ctx.lineTo(pxm + Math.cos(player.angle) * 8, pym + Math.sin(player.angle) * 8);
            ctx.stroke();
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(pxm, pym, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        function draw() {
            draw3D();
            drawMinimap();

            if (won) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
                ctx.fillStyle = '#4ade80';
                ctx.font = 'bold 28px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('You reached the exit!', SCREEN_W / 2, SCREEN_H / 2 - 20);
                ctx.fillStyle = '#fff';
                ctx.font = '16px Arial';
                ctx.fillText(`Time: ${(elapsedMs / 1000).toFixed(1)}s`, SCREEN_W / 2, SCREEN_H / 2 + 14);
                ctx.font = '14px Arial';
                ctx.fillStyle = '#aaa';
                ctx.fillText('Press Space for a new maze', SCREEN_W / 2, SCREEN_H / 2 + 42);
            }
        }

        function gameLoop(timestamp) {
            if (lastTime === 0) lastTime = timestamp;
            const dt = timestamp - lastTime;
            lastTime = timestamp;
            update(dt);
            draw();
            timerEl.textContent = (elapsedMs / 1000).toFixed(1);
            requestAnimationFrame(gameLoop);
        }

        function init() {
            grid = generateMaze(CELLS_W, CELLS_H);
            exitGridX = (CELLS_W - 1) * 2 + 1;
            exitGridY = (CELLS_H - 1) * 2 + 1;
            player = { x: 1.5, y: 1.5, angle: Math.PI / 4 };
            won = false;
            elapsedMs = 0;
            keys = keys || {};
            lastTime = 0;
        }

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key.startsWith('Arrow') || e.key === ' ') e.preventDefault();
            if (won && e.key === ' ') init();
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        init();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
