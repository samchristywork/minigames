<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nonogram</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #hud {
            display: flex;
            gap: 30px;
            color: #4ade80;
            font-size: 18px;
            margin-bottom: 10px;
        }
        canvas {
            border: 4px solid #4ade80;
            border-radius: 4px;
            background: #12121f;
            cursor: pointer;
        }
        #instructions {
            color: #888;
            margin-top: 12px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div>Time: <span id="time">0:00</span></div>
        <div>Size: <span id="size">10x10</span></div>
        <div>Status: <span id="status">Solving</span></div>
    </div>
    <canvas id="game" width="400" height="480"></canvas>
    <div id="instructions">Left-click to fill a cell, right-click to mark an "X" (not filled). Match every row and column clue to reveal the picture.</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const timeEl = document.getElementById('time');
        const sizeEl = document.getElementById('size');
        const statusEl = document.getElementById('status');

        const CELL = 26;
        const SIZES = [5, 10, 15];
        const BUTTON_H = 44;

        let sizeIndex, size;
        let solution, rowClues, colClues, playerGrid;
        let boardX, boardY, boardPx, buttonY;
        let timerFrames, solved;

        const BUTTONS = [
            { label: 'New Game', w: 160 },
            { label: 'Size', w: 160 }
        ];

        function computeRunClues(line) {
            const runs = [];
            let count = 0;
            for (const cell of line) {
                if (cell) count++;
                else if (count > 0) { runs.push(count); count = 0; }
            }
            if (count > 0) runs.push(count);
            if (runs.length === 0) runs.push(0);
            return runs;
        }

        function isTrivial(grid) {
            let filled = 0, total = 0;
            for (const row of grid) for (const cell of row) { total++; if (cell) filled++; }
            return filled === 0 || filled === total;
        }

        function generatePuzzle() {
            let grid;
            do {
                grid = [];
                for (let r = 0; r < size; r++) {
                    const row = [];
                    for (let c = 0; c < size; c++) row.push(Math.random() < 0.5);
                    grid.push(row);
                }
            } while (isTrivial(grid));

            solution = grid;
            rowClues = solution.map(row => computeRunClues(row));
            colClues = [];
            for (let c = 0; c < size; c++) {
                const col = [];
                for (let r = 0; r < size; r++) col.push(solution[r][c]);
                colClues.push(computeRunClues(col));
            }
        }

        function layoutCanvas() {
            const maxRowLen = Math.max(...rowClues.map(c => c.length));
            const maxColLen = Math.max(...colClues.map(c => c.length));

            boardX = 16 + maxRowLen * 16;
            boardY = 16 + maxColLen * 14;
            boardPx = size * CELL;
            buttonY = boardY + boardPx + 10;

            const naturalWidth = boardX + boardPx + 16;
            const buttonBarWidth = BUTTONS.reduce((sum, btn) => sum + btn.w, 0) + (BUTTONS.length - 1) * 10 + 20;

            canvas.width = Math.max(naturalWidth, buttonBarWidth);
            canvas.height = buttonY + BUTTON_H + 10;

            boardX += Math.max(0, canvas.width - naturalWidth) / 2;

            const totalButtonsWidth = BUTTONS.reduce((sum, btn) => sum + btn.w, 0) + (BUTTONS.length - 1) * 10;
            let x = (canvas.width - totalButtonsWidth) / 2;
            for (const btn of BUTTONS) {
                btn.x = x;
                x += btn.w + 10;
            }
        }

        function newGame() {
            size = SIZES[sizeIndex];
            sizeEl.textContent = `${size}x${size}`;
            generatePuzzle();
            layoutCanvas();

            playerGrid = [];
            for (let r = 0; r < size; r++) playerGrid.push(new Array(size).fill('empty'));

            timerFrames = 0;
            solved = false;
            statusEl.textContent = 'Solving';
        }

        function init() {
            sizeIndex = 1;
            newGame();
        }

        function cycleSize() {
            sizeIndex = (sizeIndex + 1) % SIZES.length;
            newGame();
        }

        function lineSatisfied(boolLine, targetClue) {
            const current = computeRunClues(boolLine);
            if (current.length !== targetClue.length) return false;
            for (let i = 0; i < current.length; i++) if (current[i] !== targetClue[i]) return false;
            return true;
        }

        function checkWin() {
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const filled = playerGrid[r][c] === 'filled';
                    if (filled !== solution[r][c]) return;
                }
            }
            solved = true;
            statusEl.textContent = 'Solved!';
        }

        function toggleFill(r, c) {
            if (solved) return;
            playerGrid[r][c] = playerGrid[r][c] === 'filled' ? 'empty' : 'filled';
            checkWin();
        }

        function toggleMark(r, c) {
            if (solved) return;
            playerGrid[r][c] = playerGrid[r][c] === 'x' ? 'empty' : 'x';
        }

        function cellFromEvent(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width) - boardX;
            const y = (e.clientY - rect.top) * (canvas.height / rect.height) - boardY;
            if (x < 0 || x >= boardPx || y < 0 || y >= boardPx) return null;
            return { r: Math.floor(y / CELL), c: Math.floor(x / CELL) };
        }

        function update() {
            if (!solved) {
                timerFrames++;
                const totalSeconds = Math.floor(timerFrames / 60);
                const mm = Math.floor(totalSeconds / 60);
                const ss = totalSeconds % 60;
                timeEl.textContent = `${mm}:${ss.toString().padStart(2, '0')}`;
            }
        }

        function drawGrid() {
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const x = boardX + c * CELL;
                    const y = boardY + r * CELL;
                    const cell = playerGrid[r][c];

                    ctx.fillStyle = (Math.floor(r / 5) + Math.floor(c / 5)) % 2 === 0 ? '#1a2038' : '#161b30';
                    ctx.fillRect(x, y, CELL, CELL);

                    if (cell === 'filled') {
                        ctx.fillStyle = '#4ade80';
                        ctx.fillRect(x + 2, y + 2, CELL - 4, CELL - 4);
                    } else if (cell === 'x') {
                        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(x + 6, y + 6);
                        ctx.lineTo(x + CELL - 6, y + CELL - 6);
                        ctx.moveTo(x + CELL - 6, y + 6);
                        ctx.lineTo(x + 6, y + CELL - 6);
                        ctx.stroke();
                    }

                    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x, y, CELL, CELL);
                }
            }

            ctx.strokeStyle = '#4ade80';
            ctx.lineWidth = 2;
            for (let i = 0; i <= size; i += 5) {
                ctx.beginPath();
                ctx.moveTo(boardX + i * CELL, boardY);
                ctx.lineTo(boardX + i * CELL, boardY + boardPx);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(boardX, boardY + i * CELL);
                ctx.lineTo(boardX + boardPx, boardY + i * CELL);
                ctx.stroke();
            }
        }

        function drawClues() {
            ctx.font = '13px Arial';
            ctx.textBaseline = 'middle';

            for (let r = 0; r < size; r++) {
                const boolLine = playerGrid[r].map(v => v === 'filled');
                const satisfied = lineSatisfied(boolLine, rowClues[r]);
                ctx.fillStyle = satisfied ? 'rgba(74,222,128,0.4)' : '#ddd';
                ctx.textAlign = 'right';
                ctx.fillText(rowClues[r].join(' '), boardX - 8, boardY + r * CELL + CELL / 2);
            }

            ctx.textAlign = 'center';
            for (let c = 0; c < size; c++) {
                const boolLine = [];
                for (let r = 0; r < size; r++) boolLine.push(playerGrid[r][c] === 'filled');
                const satisfied = lineSatisfied(boolLine, colClues[c]);
                ctx.fillStyle = satisfied ? 'rgba(74,222,128,0.4)' : '#ddd';

                const clue = colClues[c];
                for (let i = 0; i < clue.length; i++) {
                    const y = boardY - (clue.length - i) * 14 + 2;
                    ctx.fillText(clue[i], boardX + c * CELL + CELL / 2, y);
                }
            }
        }

        function drawButtons() {
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (const btn of BUTTONS) {
                ctx.fillStyle = '#223';
                ctx.fillRect(btn.x, buttonY, btn.w, BUTTON_H);
                ctx.strokeStyle = '#4ade80';
                ctx.lineWidth = 2;
                ctx.strokeRect(btn.x, buttonY, btn.w, BUTTON_H);
                ctx.fillStyle = '#4ade80';
                const label = btn.label === 'Size' ? `Size: ${size}x${size}` : btn.label;
                ctx.fillText(label, btn.x + btn.w / 2, buttonY + BUTTON_H / 2);
            }
        }

        function draw() {
            ctx.fillStyle = '#12121f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawClues();
            drawGrid();
            drawButtons();

            if (solved) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(boardX, boardY, boardPx, boardPx);

                ctx.fillStyle = '#4ade80';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('SOLVED!', boardX + boardPx / 2, boardY + boardPx / 2 - 12);

                ctx.fillStyle = '#fff';
                ctx.font = '14px Arial';
                ctx.fillText(`Time: ${timeEl.textContent}`, boardX + boardPx / 2, boardY + boardPx / 2 + 16);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
