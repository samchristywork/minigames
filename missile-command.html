<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missile Command</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #hud {
            display: flex;
            gap: 30px;
            color: #4ade80;
            font-size: 20px;
            margin-bottom: 10px;
        }
        canvas {
            border: 4px solid #4ade80;
            border-radius: 4px;
            background: #000;
            cursor: crosshair;
        }
        #instructions {
            color: #888;
            margin-top: 12px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div>Score: <span id="score">0</span></div>
        <div>Cities: <span id="lives">6</span></div>
        <div>Level: <span id="level">1</span></div>
    </div>
    <canvas id="game" width="640" height="480"></canvas>
    <div id="instructions">Move the mouse to aim, click to fire an interceptor from your nearest loaded silo. Protect your cities!</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const levelEl = document.getElementById('level');

        const GROUND_Y = 440;
        const BATTERY_X = [50, 320, 590];
        const CITY_X = [120, 190, 260, 380, 450, 520];
        const BASE_AMMO = 10;

        let score, level, gameOver;
        let batteries, cities;
        let enemyMissiles, playerMissiles, explosions;
        let waveTotal, waveSpawned, spawnTimer;
        let mouseX, mouseY;
        let animTick;

        function citiesAlive() {
            return cities.filter(c => c.alive).length;
        }

        function init() {
            batteries = BATTERY_X.map(x => ({ x, y: GROUND_Y, ammo: BASE_AMMO, alive: true }));
            cities = CITY_X.map(x => ({ x, y: GROUND_Y, alive: true }));
            enemyMissiles = [];
            playerMissiles = [];
            explosions = [];
            waveTotal = 6 + level * 2;
            waveSpawned = 0;
            spawnTimer = 60;
            mouseX = canvas.width / 2;
            mouseY = canvas.height / 2;
            animTick = 0;
            gameOver = false;
            livesEl.textContent = citiesAlive();
        }

        function pickTarget() {
            const options = [];
            for (const c of cities) if (c.alive) options.push({ x: c.x, y: GROUND_Y, type: 'city', ref: c });
            for (const b of batteries) if (b.alive) options.push({ x: b.x, y: GROUND_Y, type: 'battery', ref: b });
            if (options.length === 0) return null;
            return options[Math.floor(Math.random() * options.length)];
        }

        function spawnEnemyMissile() {
            const target = pickTarget();
            if (!target) return;

            const x = Math.random() * canvas.width;
            const y = 0;
            const speed = 0.7 + level * 0.08;
            const dx = target.x - x;
            const dy = target.y - y;
            const dist = Math.hypot(dx, dy);

            const isMirv = level >= 3 && Math.random() < 0.25;

            enemyMissiles.push({
                x, y,
                vx: (dx / dist) * speed,
                vy: (dy / dist) * speed,
                target,
                trailX: x, trailY: y,
                mirv: isMirv,
                mirvY: isMirv ? 120 + Math.random() * 150 : -1,
                hasSplit: false
            });
        }

        function splitMissile(m) {
            m.hasSplit = true;
            for (let i = 0; i < 2; i++) {
                const target = pickTarget();
                if (!target) continue;
                const dx = target.x - m.x;
                const dy = target.y - m.y;
                const dist = Math.hypot(dx, dy);
                const speed = 0.9 + level * 0.08;
                enemyMissiles.push({
                    x: m.x, y: m.y,
                    vx: (dx / dist) * speed,
                    vy: (dy / dist) * speed,
                    target,
                    trailX: m.x, trailY: m.y,
                    mirv: false,
                    mirvY: -1,
                    hasSplit: true
                });
            }
        }

        function fireInterceptor(tx, ty) {
            let best = null;
            let bestDist = Infinity;
            for (const b of batteries) {
                if (!b.alive || b.ammo <= 0) continue;
                const d = Math.abs(b.x - tx);
                if (d < bestDist) {
                    bestDist = d;
                    best = b;
                }
            }
            if (!best) return;

            best.ammo--;
            const dx = tx - best.x;
            const dy = ty - best.y;
            const dist = Math.hypot(dx, dy);
            const speed = 6;
            playerMissiles.push({
                x: best.x, y: best.y,
                vx: (dx / dist) * speed,
                vy: (dy / dist) * speed,
                targetX: tx, targetY: ty,
                trailX: best.x, trailY: best.y
            });
        }
    </script>
</body>
</html>
