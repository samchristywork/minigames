<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missile Command</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #hud {
            display: flex;
            gap: 30px;
            color: #4ade80;
            font-size: 20px;
            margin-bottom: 10px;
        }
        canvas {
            border: 4px solid #4ade80;
            border-radius: 4px;
            background: #000;
            cursor: crosshair;
        }
        #instructions {
            color: #888;
            margin-top: 12px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div>Score: <span id="score">0</span></div>
        <div>Cities: <span id="lives">6</span></div>
        <div>Level: <span id="level">1</span></div>
    </div>
    <canvas id="game" width="640" height="480"></canvas>
    <div id="instructions">Move the mouse to aim, click to fire an interceptor from your nearest loaded silo. Protect your cities!</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const levelEl = document.getElementById('level');

        const GROUND_Y = 440;
        const BATTERY_X = [50, 320, 590];
        const CITY_X = [120, 190, 260, 380, 450, 520];
        const BASE_AMMO = 10;

        let score, level, gameOver;
        let batteries, cities;
        let enemyMissiles, playerMissiles, explosions;
        let waveTotal, waveSpawned, spawnTimer;
        let mouseX, mouseY;
        let animTick;

        function citiesAlive() {
            return cities.filter(c => c.alive).length;
        }

        function init() {
            batteries = BATTERY_X.map(x => ({ x, y: GROUND_Y, ammo: BASE_AMMO, alive: true }));
            cities = CITY_X.map(x => ({ x, y: GROUND_Y, alive: true }));
            enemyMissiles = [];
            playerMissiles = [];
            explosions = [];
            waveTotal = 6 + level * 2;
            waveSpawned = 0;
            spawnTimer = 60;
            mouseX = canvas.width / 2;
            mouseY = canvas.height / 2;
            animTick = 0;
            gameOver = false;
            livesEl.textContent = citiesAlive();
        }

        function pickTarget() {
            const options = [];
            for (const c of cities) if (c.alive) options.push({ x: c.x, y: GROUND_Y, type: 'city', ref: c });
            for (const b of batteries) if (b.alive) options.push({ x: b.x, y: GROUND_Y, type: 'battery', ref: b });
            if (options.length === 0) return null;
            return options[Math.floor(Math.random() * options.length)];
        }

        function spawnEnemyMissile() {
            const target = pickTarget();
            if (!target) return;

            const x = Math.random() * canvas.width;
            const y = 0;
            const speed = 0.7 + level * 0.08;
            const dx = target.x - x;
            const dy = target.y - y;
            const dist = Math.hypot(dx, dy);

            const isMirv = level >= 3 && Math.random() < 0.25;

            enemyMissiles.push({
                x, y,
                vx: (dx / dist) * speed,
                vy: (dy / dist) * speed,
                target,
                trailX: x, trailY: y,
                mirv: isMirv,
                mirvY: isMirv ? 120 + Math.random() * 150 : -1,
                hasSplit: false
            });
        }

        function splitMissile(m) {
            m.hasSplit = true;
            for (let i = 0; i < 2; i++) {
                const target = pickTarget();
                if (!target) continue;
                const dx = target.x - m.x;
                const dy = target.y - m.y;
                const dist = Math.hypot(dx, dy);
                const speed = 0.9 + level * 0.08;
                enemyMissiles.push({
                    x: m.x, y: m.y,
                    vx: (dx / dist) * speed,
                    vy: (dy / dist) * speed,
                    target,
                    trailX: m.x, trailY: m.y,
                    mirv: false,
                    mirvY: -1,
                    hasSplit: true
                });
            }
        }

        function fireInterceptor(tx, ty) {
            let best = null;
            let bestDist = Infinity;
            for (const b of batteries) {
                if (!b.alive || b.ammo <= 0) continue;
                const d = Math.abs(b.x - tx);
                if (d < bestDist) {
                    bestDist = d;
                    best = b;
                }
            }
            if (!best) return;

            best.ammo--;
            const dx = tx - best.x;
            const dy = ty - best.y;
            const dist = Math.hypot(dx, dy);
            const speed = 6;
            playerMissiles.push({
                x: best.x, y: best.y,
                vx: (dx / dist) * speed,
                vy: (dy / dist) * speed,
                targetX: tx, targetY: ty,
                trailX: best.x, trailY: best.y
            });
        }

        function addExplosion(x, y, maxRadius) {
            explosions.push({ x, y, radius: 4, maxRadius: maxRadius || 34, phase: 'grow', timer: 0 });
        }

        function updateExplosions() {
            for (let i = explosions.length - 1; i >= 0; i--) {
                const e = explosions[i];
                e.timer++;
                if (e.phase === 'grow') {
                    e.radius += 2.2;
                    if (e.radius >= e.maxRadius) e.phase = 'hold';
                } else if (e.phase === 'hold') {
                    if (e.timer > 25) e.phase = 'shrink';
                } else {
                    e.radius -= 1.5;
                    if (e.radius <= 0) explosions.splice(i, 1);
                }
            }
        }

        function updatePlayerMissiles() {
            for (let i = playerMissiles.length - 1; i >= 0; i--) {
                const m = playerMissiles[i];
                m.trailX = m.x;
                m.trailY = m.y;
                m.x += m.vx;
                m.y += m.vy;
                const dx = m.targetX - m.x;
                const dy = m.targetY - m.y;
                if (Math.hypot(dx, dy) < 8 || m.y <= 0) {
                    addExplosion(m.targetX, m.targetY);
                    playerMissiles.splice(i, 1);
                }
            }
        }

        function updateEnemyMissiles() {
            for (let i = enemyMissiles.length - 1; i >= 0; i--) {
                const m = enemyMissiles[i];

                if (m.mirv && !m.hasSplit && m.y >= m.mirvY) {
                    splitMissile(m);
                    enemyMissiles.splice(i, 1);
                    continue;
                }

                m.trailX = m.x;
                m.trailY = m.y;
                m.x += m.vx;
                m.y += m.vy;

                let hitExplosion = false;
                for (const e of explosions) {
                    if (Math.hypot(m.x - e.x, m.y - e.y) < e.radius) {
                        hitExplosion = true;
                        break;
                    }
                }
                if (hitExplosion) {
                    score += m.hasSplit ? 50 : 100;
                    scoreEl.textContent = score;
                    addExplosion(m.x, m.y, 18);
                    enemyMissiles.splice(i, 1);
                    continue;
                }

                const dx = m.target.x - m.x;
                const dy = m.target.y - m.y;
                if (Math.hypot(dx, dy) < 5 || m.y >= GROUND_Y) {
                    if (m.target.type === 'city') {
                        m.target.ref.alive = false;
                    } else {
                        m.target.ref.ammo = 0;
                        m.target.ref.alive = false;
                    }
                    addExplosion(m.target.x, GROUND_Y, 24);
                    enemyMissiles.splice(i, 1);
                    livesEl.textContent = citiesAlive();

                    if (citiesAlive() === 0) {
                        gameOver = true;
                    }
                }
            }
        }

        function checkWaveComplete() {
            if (gameOver) return;
            if (waveSpawned >= waveTotal && enemyMissiles.length === 0) {
                let bonus = citiesAlive() * 100;
                for (const b of batteries) if (b.alive) bonus += b.ammo * 5;
                score += bonus;
                scoreEl.textContent = score;

                level++;
                levelEl.textContent = level;
                for (const b of batteries) if (b.alive) b.ammo = BASE_AMMO;
                waveTotal = 6 + level * 2;
                waveSpawned = 0;
                spawnTimer = 90;
            }
        }

        function update() {
            if (gameOver) return;
            animTick++;

            if (waveSpawned < waveTotal) {
                spawnTimer--;
                if (spawnTimer <= 0) {
                    spawnEnemyMissile();
                    waveSpawned++;
                    spawnTimer = 40 + Math.random() * 50 - level * 2;
                    if (spawnTimer < 12) spawnTimer = 12;
                }
            }

            updateEnemyMissiles();
            updatePlayerMissiles();
            updateExplosions();
            checkWaveComplete();
        }

        function drawGround() {
            ctx.fillStyle = '#2a2a3e';
            ctx.fillRect(0, GROUND_Y + 8, canvas.width, canvas.height - GROUND_Y - 8);
            ctx.strokeStyle = '#4ade80';
            ctx.beginPath();
            ctx.moveTo(0, GROUND_Y + 8);
            ctx.lineTo(canvas.width, GROUND_Y + 8);
            ctx.stroke();
        }

        function drawBattery(b) {
            if (!b.alive) {
                ctx.fillStyle = '#552222';
                ctx.beginPath();
                ctx.moveTo(b.x - 16, GROUND_Y + 8);
                ctx.lineTo(b.x, GROUND_Y - 6);
                ctx.lineTo(b.x + 16, GROUND_Y + 8);
                ctx.closePath();
                ctx.fill();
                return;
            }
            ctx.fillStyle = '#4ade80';
            ctx.beginPath();
            ctx.moveTo(b.x - 18, GROUND_Y + 8);
            ctx.lineTo(b.x, GROUND_Y - 20);
            ctx.lineTo(b.x + 18, GROUND_Y + 8);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#fff';
            ctx.font = '11px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(b.ammo, b.x, GROUND_Y + 22);
        }

        function drawCity(c) {
            if (!c.alive) {
                ctx.fillStyle = '#333';
                ctx.fillRect(c.x - 18, GROUND_Y - 6, 36, 14);
                return;
            }
            ctx.fillStyle = '#5aa9ff';
            ctx.fillRect(c.x - 18, GROUND_Y - 18, 10, 26);
            ctx.fillRect(c.x - 5, GROUND_Y - 26, 10, 34);
            ctx.fillRect(c.x + 8, GROUND_Y - 14, 10, 22);
            ctx.fillStyle = '#ffe066';
            ctx.fillRect(c.x - 15, GROUND_Y - 14, 3, 3);
            ctx.fillRect(c.x - 2, GROUND_Y - 20, 3, 3);
            ctx.fillRect(c.x + 11, GROUND_Y - 10, 3, 3);
        }

        function drawEnemyMissiles() {
            ctx.strokeStyle = '#ff5544';
            ctx.lineWidth = 2;
            for (const m of enemyMissiles) {
                ctx.beginPath();
                ctx.moveTo(m.trailX, m.trailY);
                ctx.lineTo(m.x, m.y);
                ctx.stroke();
                ctx.fillStyle = m.mirv ? '#ffaa00' : '#ff5544';
                ctx.beginPath();
                ctx.arc(m.x, m.y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawPlayerMissiles() {
            ctx.strokeStyle = '#7ee8ff';
            ctx.lineWidth = 2;
            for (const m of playerMissiles) {
                ctx.beginPath();
                ctx.moveTo(m.trailX, m.trailY);
                ctx.lineTo(m.x, m.y);
                ctx.stroke();
                ctx.fillStyle = '#7ee8ff';
                ctx.beginPath();
                ctx.arc(m.x, m.y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawExplosions() {
            for (const e of explosions) {
                const grad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.radius);
                grad.addColorStop(0, 'rgba(255,255,200,0.9)');
                grad.addColorStop(0.6, 'rgba(255,150,50,0.7)');
                grad.addColorStop(1, 'rgba(255,60,30,0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawCrosshair() {
            if (gameOver) return;
            ctx.strokeStyle = '#4ade80';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(mouseX - 10, mouseY);
            ctx.lineTo(mouseX + 10, mouseY);
            ctx.moveTo(mouseX, mouseY - 10);
            ctx.lineTo(mouseX, mouseY + 10);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 6, 0, Math.PI * 2);
            ctx.stroke();
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawGround();
            for (const b of batteries) drawBattery(b);
            for (const c of cities) drawCity(c);
            drawEnemyMissiles();
            drawPlayerMissiles();
            drawExplosions();
            drawCrosshair();

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#f44';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);

                ctx.fillStyle = '#fff';
                ctx.font = '22px Arial';
                ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2 + 20);

                ctx.font = '16px Arial';
                ctx.fillStyle = '#aaa';
                ctx.fillText('Press Space to restart', canvas.width / 2, canvas.height / 2 + 55);
            }
        }
    </script>
</body>
</html>
