<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkers</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #hud {
            display: flex;
            gap: 30px;
            color: #4ade80;
            font-size: 18px;
            margin-bottom: 10px;
        }
        canvas {
            border: 4px solid #4ade80;
            border-radius: 4px;
            background: #12121f;
            cursor: pointer;
        }
        #instructions {
            color: #888;
            margin-top: 12px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div>You: <span id="redCount">12</span></div>
        <div>AI: <span id="blackCount">12</span></div>
        <div>Status: <span id="status">Your turn</span></div>
    </div>
    <canvas id="game" width="420" height="490"></canvas>
    <div id="instructions">You play red and move first. Click a piece, then click a highlighted square to move. Captures are mandatory, and you must keep jumping with the same piece while another capture is available.</div>

    <script>
    </script>
</body>
</html>
