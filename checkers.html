<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkers</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #hud {
            display: flex;
            gap: 30px;
            color: #4ade80;
            font-size: 18px;
            margin-bottom: 10px;
        }
        canvas {
            border: 4px solid #4ade80;
            border-radius: 4px;
            background: #12121f;
            cursor: pointer;
        }
        #instructions {
            color: #888;
            margin-top: 12px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div>You: <span id="redCount">12</span></div>
        <div>AI: <span id="blackCount">12</span></div>
        <div>Status: <span id="status">Your turn</span></div>
    </div>
    <canvas id="game" width="420" height="490"></canvas>
    <div id="instructions">You play red and move first. Click a piece, then click a highlighted square to move. Captures are mandatory, and you must keep jumping with the same piece while another capture is available.</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const redCountEl = document.getElementById('redCount');
        const blackCountEl = document.getElementById('blackCount');
        const statusEl = document.getElementById('status');

        const SIZE = 8;
        const CELL = 50;
        const BOARD_X = 10;
        const BOARD_Y = 10;
        const BOARD_PX = SIZE * CELL;
        const BUTTON_Y = BOARD_Y + BOARD_PX + 12;
        const BUTTON_H = 44;
        const AI_DEPTH = 5;

        const ALL_DIRS = [[-1, -1], [-1, 1], [1, -1], [1, 1]];
        const RED_DIRS = [[-1, -1], [-1, 1]];
        const BLACK_DIRS = [[1, -1], [1, 1]];

        const BUTTONS = [{ label: 'New Game', x: (420 - 160) / 2, w: 160 }];

        let board, turn, selected, forcedPiece, gameOver, winner, aiDelay;

        function dirsFor(piece) {
            if (piece.king) return ALL_DIRS;
            return piece.color === 'red' ? RED_DIRS : BLACK_DIRS;
        }

        function inBounds(r, c) { return r >= 0 && r < SIZE && c >= 0 && c < SIZE; }

        function setup() {
            board = [];
            for (let r = 0; r < SIZE; r++) board.push(new Array(SIZE).fill(null));
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if ((r + c) % 2 !== 1) continue;
                    if (r < 3) board[r][c] = { color: 'black', king: false };
                    else if (r > 4) board[r][c] = { color: 'red', king: false };
                }
            }
            turn = 'player';
            selected = null;
            forcedPiece = null;
            gameOver = false;
            winner = null;
            aiDelay = 0;
            statusEl.textContent = 'Your turn';
            updateCounts();
        }

        function updateCounts() {
            let red = 0, black = 0;
            for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
                const p = board[r][c];
                if (p) { if (p.color === 'red') red++; else black++; }
            }
            redCountEl.textContent = red;
            blackCountEl.textContent = black;
        }

        function pieceMoves(b, r, c) {
            const piece = b[r][c];
            if (!piece) return [];
            const moves = [];
            for (const [dr, dc] of dirsFor(piece)) {
                const nr = r + dr, nc = c + dc;
                if (inBounds(nr, nc) && !b[nr][nc]) moves.push({ from: { r, c }, to: { r: nr, c: nc } });
            }
            return moves;
        }

        function pieceCapturesNow(b, r, c) {
            const piece = b[r][c];
            if (!piece) return [];
            const captures = [];
            for (const [dr, dc] of dirsFor(piece)) {
                const mr = r + dr, mc = c + dc;
                const nr = r + 2 * dr, nc = c + 2 * dc;
                if (!inBounds(nr, nc)) continue;
                const mid = b[mr][mc];
                if (mid && mid.color !== piece.color && !b[nr][nc]) {
                    captures.push({ from: { r, c }, to: { r: nr, c: nc }, captured: [{ r: mr, c: mc }] });
                }
            }
            return captures;
        }

        function generateJumpSequences(b, r, c, color, isKingAtStart, capturedSoFar) {
            const dirs = isKingAtStart ? ALL_DIRS : (color === 'red' ? RED_DIRS : BLACK_DIRS);
            const sequences = [];
            for (const [dr, dc] of dirs) {
                const mr = r + dr, mc = c + dc;
                const nr = r + 2 * dr, nc = c + 2 * dc;
                if (!inBounds(nr, nc)) continue;
                if (capturedSoFar.some(cap => cap.r === mr && cap.c === mc)) continue;
                const mid = b[mr][mc];
                if (!mid || mid.color === color || b[nr][nc]) continue;

                const wouldKing = !isKingAtStart && ((color === 'red' && nr === 0) || (color === 'black' && nr === SIZE - 1));
                const newCaptured = [...capturedSoFar, { r: mr, c: mc }];
                if (wouldKing) {
                    sequences.push({ r: nr, c: nc, captured: newCaptured });
                } else {
                    const further = generateJumpSequences(b, nr, nc, color, isKingAtStart, newCaptured);
                    if (further.length === 0) sequences.push({ r: nr, c: nc, captured: newCaptured });
                    else sequences.push(...further);
                }
            }
            return sequences;
        }

        function getAllCompleteMoves(b, color) {
            const captureMoves = [];
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const piece = b[r][c];
                    if (!piece || piece.color !== color) continue;
                    const seqs = generateJumpSequences(b, r, c, color, piece.king, []);
                    for (const seq of seqs) captureMoves.push({ from: { r, c }, to: { r: seq.r, c: seq.c }, captured: seq.captured });
                }
            }
            if (captureMoves.length > 0) return captureMoves;

            const simple = [];
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const piece = b[r][c];
                    if (piece && piece.color === color) simple.push(...pieceMoves(b, r, c));
                }
            }
            return simple;
        }

        function hasAnyLegalMove(b, color) {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const piece = b[r][c];
                    if (!piece || piece.color !== color) continue;
                    if (pieceCapturesNow(b, r, c).length > 0 || pieceMoves(b, r, c).length > 0) return true;
                }
            }
            return false;
        }

        function applyMoveInPlace(b, move) {
            const piece = b[move.from.r][move.from.c];
            b[move.from.r][move.from.c] = null;
            if (move.captured) for (const cap of move.captured) b[cap.r][cap.c] = null;
            b[move.to.r][move.to.c] = piece;
            if (!piece.king) {
                if ((piece.color === 'red' && move.to.r === 0) || (piece.color === 'black' && move.to.r === SIZE - 1)) piece.king = true;
            }
            return piece;
        }

        function cloneBoard(b) {
            return b.map(row => row.map(cell => cell ? { ...cell } : null));
        }

        function evaluateBoard(b, aiColor) {
            const oppColor = aiColor === 'red' ? 'black' : 'red';
            let score = 0;
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const p = b[r][c];
                    if (!p) continue;
                    const val = p.king ? 1.6 : 1;
                    score += p.color === aiColor ? val : -val;
                }
            }
            return score;
        }

        function minimaxCheckers(b, depth, alpha, beta, maximizing, aiColor, oppColor) {
            const color = maximizing ? aiColor : oppColor;
            const moves = getAllCompleteMoves(b, color);
            if (moves.length === 0) return maximizing ? -100 : 100;
            if (depth === 0) return evaluateBoard(b, aiColor);

            if (maximizing) {
                let best = -Infinity;
                for (const mv of moves) {
                    const nb = cloneBoard(b);
                    applyMoveInPlace(nb, mv);
                    best = Math.max(best, minimaxCheckers(nb, depth - 1, alpha, beta, false, aiColor, oppColor));
                    alpha = Math.max(alpha, best);
                    if (beta <= alpha) break;
                }
                return best;
            } else {
                let best = Infinity;
                for (const mv of moves) {
                    const nb = cloneBoard(b);
                    applyMoveInPlace(nb, mv);
                    best = Math.min(best, minimaxCheckers(nb, depth - 1, alpha, beta, true, aiColor, oppColor));
                    beta = Math.min(beta, best);
                    if (beta <= alpha) break;
                }
                return best;
            }
        }

        function chooseAiMove() {
            const moves = getAllCompleteMoves(board, 'black');
            let bestScore = -Infinity, bestMoves = [];
            for (const mv of moves) {
                const nb = cloneBoard(board);
                applyMoveInPlace(nb, mv);
                const score = minimaxCheckers(nb, AI_DEPTH - 1, -Infinity, Infinity, false, 'black', 'red');
                if (score > bestScore) { bestScore = score; bestMoves = [mv]; }
                else if (score === bestScore) bestMoves.push(mv);
            }
            return bestMoves[Math.floor(Math.random() * bestMoves.length)];
        }

        function endTurn() {
            selected = null;
            forcedPiece = null;
            updateCounts();
            turn = turn === 'player' ? 'ai' : 'player';
            const nextColor = turn === 'player' ? 'red' : 'black';
            if (!hasAnyLegalMove(board, nextColor)) {
                gameOver = true;
                winner = turn === 'player' ? 'ai' : 'player';
                statusEl.textContent = winner === 'player' ? 'You win!' : 'AI wins!';
                return;
            }
            if (turn === 'ai') { aiDelay = 30; statusEl.textContent = 'AI is thinking...'; }
            else statusEl.textContent = 'Your turn';
        }

        function attemptCaptureMove(destR, destC) {
            const caps = pieceCapturesNow(board, selected.r, selected.c);
            const match = caps.find(cap => cap.to.r === destR && cap.to.c === destC);
            if (!match) { if (!forcedPiece) selected = null; return; }

            const pieceBeforeMove = board[selected.r][selected.c];
            const wasKing = pieceBeforeMove.king;
            applyMoveInPlace(board, match);

            if (!wasKing && board[destR][destC].king) { endTurn(); return; }

            const further = pieceCapturesNow(board, destR, destC);
            if (further.length > 0) {
                selected = { r: destR, c: destC };
                forcedPiece = selected;
            } else {
                endTurn();
            }
        }

        function attemptSimpleMove(destR, destC) {
            const moves = pieceMoves(board, selected.r, selected.c);
            const match = moves.find(mv => mv.to.r === destR && mv.to.c === destC);
            if (!match) { selected = null; return; }
            applyMoveInPlace(board, match);
            endTurn();
        }

        function handleBoardClick(r, c) {
            if (gameOver || turn !== 'player') return;

            if (forcedPiece) {
                attemptCaptureMove(r, c);
                return;
            }

            const mandatory = hasCaptureForColor(board, 'red');
            const piece = board[r][c];
            if (piece && piece.color === 'red') {
                if (mandatory && pieceCapturesNow(board, r, c).length === 0) return;
                selected = (selected && selected.r === r && selected.c === c) ? null : { r, c };
                return;
            }

            if (!selected) return;
            if (mandatory) attemptCaptureMove(r, c);
            else attemptSimpleMove(r, c);
        }

        function hasCaptureForColor(b, color) {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const p = b[r][c];
                    if (p && p.color === color && pieceCapturesNow(b, r, c).length > 0) return true;
                }
            }
            return false;
        }

        function update() {
            if (gameOver || turn !== 'ai') return;
            aiDelay--;
            if (aiDelay <= 0) {
                const move = chooseAiMove();
                if (move) applyMoveInPlace(board, move);
                endTurn();
            }
        }

        function drawBoard() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const x = BOARD_X + c * CELL, y = BOARD_Y + r * CELL;
                    ctx.fillStyle = (r + c) % 2 === 0 ? '#e8d9b5' : '#7a5230';
                    ctx.fillRect(x, y, CELL, CELL);
                }
            }
        }

        function drawPiece(r, c, piece) {
            const x = BOARD_X + c * CELL + CELL / 2;
            const y = BOARD_Y + r * CELL + CELL / 2;
            const radius = CELL * 0.38;

            ctx.fillStyle = piece.color === 'red' ? '#d32f2f' : '#222';
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = piece.color === 'red' ? '#7a1414' : '#000';
            ctx.lineWidth = 2;
            ctx.stroke();

            if (piece.king) {
                ctx.fillStyle = '#ffd700';
                ctx.font = `bold ${Math.floor(radius)}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('K', x, y + 1);
            }
        }

        function draw() {
            ctx.fillStyle = '#12121f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawBoard();

            let highlightMoves = [];
            if (selected) {
                const mandatory = hasCaptureForColor(board, 'red');
                highlightMoves = mandatory ? pieceCapturesNow(board, selected.r, selected.c) : pieceMoves(board, selected.r, selected.c);
            }

            for (const mv of highlightMoves) {
                const x = BOARD_X + mv.to.c * CELL, y = BOARD_Y + mv.to.r * CELL;
                ctx.fillStyle = 'rgba(74,222,128,0.4)';
                ctx.fillRect(x + 4, y + 4, CELL - 8, CELL - 8);
            }

            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (board[r][c]) drawPiece(r, c, board[r][c]);
                }
            }

            if (selected) {
                const x = BOARD_X + selected.c * CELL, y = BOARD_Y + selected.r * CELL;
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 3;
                ctx.strokeRect(x + 2, y + 2, CELL - 4, CELL - 4);
            }

            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (const btn of BUTTONS) {
                ctx.fillStyle = '#223';
                ctx.fillRect(btn.x, BUTTON_Y, btn.w, BUTTON_H);
                ctx.strokeStyle = '#4ade80';
                ctx.lineWidth = 2;
                ctx.strokeRect(btn.x, BUTTON_Y, btn.w, BUTTON_H);
                ctx.fillStyle = '#4ade80';
                ctx.fillText(btn.label, btn.x + btn.w / 2, BUTTON_Y + BUTTON_H / 2);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);

            if (y >= BUTTON_Y && y <= BUTTON_Y + BUTTON_H) {
                for (const btn of BUTTONS) {
                    if (x >= btn.x && x <= btn.x + btn.w) setup();
                }
                return;
            }

            if (x >= BOARD_X && x < BOARD_X + BOARD_PX && y >= BOARD_Y && y < BOARD_Y + BOARD_PX) {
                const c = Math.floor((x - BOARD_X) / CELL);
                const r = Math.floor((y - BOARD_Y) / CELL);
                handleBoardClick(r, c);
            }
        });

        setup();
        gameLoop();
    </script>
</body>
</html>
