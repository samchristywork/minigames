<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lights Out</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #hud {
            display: flex;
            gap: 30px;
            color: #4ade80;
            font-size: 18px;
            margin-bottom: 10px;
        }
        canvas {
            border: 4px solid #4ade80;
            border-radius: 4px;
            background: #12121f;
            cursor: pointer;
        }
        #instructions {
            color: #888;
            margin-top: 12px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div>Moves: <span id="moves">0</span></div>
        <div>Time: <span id="time">0:00</span></div>
        <div>Size: <span id="size">5x5</span></div>
    </div>
    <canvas id="game" width="380" height="420"></canvas>
    <div id="instructions">Click a light to toggle it and its neighbors. Turn every light off to win!</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const movesEl = document.getElementById('moves');
        const timeEl = document.getElementById('time');
        const sizeEl = document.getElementById('size');

        const BOARD_PX = 350;
        const BOARD_X = 15;
        const BUTTON_Y = BOARD_PX + 10;
        const BUTTON_H = 50;
        const SIZES = [4, 5, 6];

        const BUTTONS = [
            { label: 'New Game', x: 15, w: 165 },
            { label: 'Size', x: 200, w: 165 }
        ];

        let sizeIndex, size, cell;
        let grid, moves, timerFrames, solved;

        function makeGrid(n) {
            const g = [];
            for (let r = 0; r < n; r++) g.push(new Array(n).fill(false));
            return g;
        }

        function flip(r, c) {
            const deltas = [[0, 0], [-1, 0], [1, 0], [0, -1], [0, 1]];
            for (const [dr, dc] of deltas) {
                const nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < size && nc >= 0 && nc < size) {
                    grid[nr][nc] = !grid[nr][nc];
                }
            }
        }

        function isAllOff() {
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (grid[r][c]) return false;
                }
            }
            return true;
        }

        function scramble() {
            grid = makeGrid(size);
            const scrambleMoves = Math.max(15, size * size);
            for (let i = 0; i < scrambleMoves; i++) {
                flip(Math.floor(Math.random() * size), Math.floor(Math.random() * size));
            }
            if (isAllOff()) {
                flip(Math.floor(Math.random() * size), Math.floor(Math.random() * size));
            }
        }

        function newGame() {
            size = SIZES[sizeIndex];
            cell = BOARD_PX / size;
            sizeEl.textContent = `${size}x${size}`;
            scramble();
            moves = 0;
            timerFrames = 0;
            solved = false;
            movesEl.textContent = moves;
        }

        function init() {
            sizeIndex = 1;
            newGame();
        }

        function cycleSize() {
            sizeIndex = (sizeIndex + 1) % SIZES.length;
            newGame();
        }

        function handleClick(r, c) {
            if (solved) return;
            flip(r, c);
            moves++;
            movesEl.textContent = moves;
            if (isAllOff()) solved = true;
        }

        function update() {
            if (!solved) {
                timerFrames++;
                const totalSeconds = Math.floor(timerFrames / 60);
                const mm = Math.floor(totalSeconds / 60);
                const ss = totalSeconds % 60;
                timeEl.textContent = `${mm}:${ss.toString().padStart(2, '0')}`;
            }
        }

        function drawGrid() {
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const x = BOARD_X + c * cell;
                    const y = r * cell;
                    const lit = grid[r][c];

                    ctx.fillStyle = lit ? '#ffcc00' : '#1c2440';
                    ctx.fillRect(x + 2, y + 2, cell - 4, cell - 4);

                    if (lit) {
                        ctx.strokeStyle = 'rgba(255,204,0,0.6)';
                        ctx.lineWidth = 4;
                        ctx.strokeRect(x + 4, y + 4, cell - 8, cell - 8);
                    }

                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x + 2, y + 2, cell - 4, cell - 4);
                }
            }
        }

        function drawButtons() {
            ctx.font = 'bold 15px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (const btn of BUTTONS) {
                ctx.fillStyle = '#223';
                ctx.fillRect(btn.x, BUTTON_Y, btn.w, BUTTON_H);
                ctx.strokeStyle = '#4ade80';
                ctx.lineWidth = 2;
                ctx.strokeRect(btn.x, BUTTON_Y, btn.w, BUTTON_H);
                ctx.fillStyle = '#4ade80';
                const label = btn.label === 'Size' ? `Size: ${size}x${size}` : btn.label;
                ctx.fillText(label, btn.x + btn.w / 2, BUTTON_Y + BUTTON_H / 2);
            }
        }

        function draw() {
            ctx.fillStyle = '#12121f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawGrid();
            drawButtons();

            if (solved) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, BOARD_PX);

                ctx.fillStyle = '#4ade80';
                ctx.font = 'bold 32px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('LIGHTS OUT!', canvas.width / 2, BOARD_PX / 2 - 20);

                ctx.fillStyle = '#fff';
                ctx.font = '16px Arial';
                ctx.fillText(`Moves: ${moves}  Time: ${timeEl.textContent}`, canvas.width / 2, BOARD_PX / 2 + 20);
            }
        }
    </script>
</body>
</html>
