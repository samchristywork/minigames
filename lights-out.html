<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lights Out</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #hud {
            display: flex;
            gap: 30px;
            color: #4ade80;
            font-size: 18px;
            margin-bottom: 10px;
        }
        canvas {
            border: 4px solid #4ade80;
            border-radius: 4px;
            background: #12121f;
            cursor: pointer;
        }
        #instructions {
            color: #888;
            margin-top: 12px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div>Moves: <span id="moves">0</span></div>
        <div>Time: <span id="time">0:00</span></div>
        <div>Size: <span id="size">5x5</span></div>
    </div>
    <canvas id="game" width="380" height="420"></canvas>
    <div id="instructions">Click a light to toggle it and its neighbors. Turn every light off to win!</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const movesEl = document.getElementById('moves');
        const timeEl = document.getElementById('time');
        const sizeEl = document.getElementById('size');

        const BOARD_PX = 350;
        const BOARD_X = 15;
        const BUTTON_Y = BOARD_PX + 10;
        const BUTTON_H = 50;
        const SIZES = [4, 5, 6];

        const BUTTONS = [
            { label: 'New Game', x: 15, w: 165 },
            { label: 'Size', x: 200, w: 165 }
        ];

        let sizeIndex, size, cell;
        let grid, moves, timerFrames, solved;

        function makeGrid(n) {
            const g = [];
            for (let r = 0; r < n; r++) g.push(new Array(n).fill(false));
            return g;
        }

        function flip(r, c) {
            const deltas = [[0, 0], [-1, 0], [1, 0], [0, -1], [0, 1]];
            for (const [dr, dc] of deltas) {
                const nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < size && nc >= 0 && nc < size) {
                    grid[nr][nc] = !grid[nr][nc];
                }
            }
        }

        function isAllOff() {
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (grid[r][c]) return false;
                }
            }
            return true;
        }

        function scramble() {
            grid = makeGrid(size);
            const scrambleMoves = Math.max(15, size * size);
            for (let i = 0; i < scrambleMoves; i++) {
                flip(Math.floor(Math.random() * size), Math.floor(Math.random() * size));
            }
            if (isAllOff()) {
                flip(Math.floor(Math.random() * size), Math.floor(Math.random() * size));
            }
        }
    </script>
</body>
</html>
