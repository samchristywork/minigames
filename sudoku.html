<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #hud {
            display: flex;
            gap: 30px;
            color: #4ade80;
            font-size: 18px;
            margin-bottom: 10px;
        }
        canvas {
            border: 4px solid #4ade80;
            border-radius: 4px;
            background: #12121f;
            cursor: pointer;
        }
        #instructions {
            color: #888;
            margin-top: 12px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div>Time: <span id="time">0:00</span></div>
        <div>Mistakes: <span id="mistakes">0</span></div>
        <div>Hints: <span id="hints">0</span></div>
        <div>Difficulty: <span id="difficulty">Easy</span></div>
    </div>
    <canvas id="game" width="450" height="520"></canvas>
    <div id="instructions">Click a cell, type 1-9 to fill it (Backspace to clear). Arrow keys move the selection, H uses a hint.</div>

    <script>
    </script>
</body>
</html>
