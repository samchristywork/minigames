<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #hud {
            display: flex;
            gap: 30px;
            color: #4ade80;
            font-size: 18px;
            margin-bottom: 10px;
        }
        canvas {
            border: 4px solid #4ade80;
            border-radius: 4px;
            background: #12121f;
            cursor: pointer;
        }
        #instructions {
            color: #888;
            margin-top: 12px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div>You: White</div>
        <div>AI: Black</div>
        <div>Status: <span id="status">Your turn</span></div>
    </div>
    <canvas id="game" width="420" height="490"></canvas>
    <div id="instructions">Click a piece to see its legal moves, then click a highlighted square to play it. Pawns always promote to queen. Castling and en passant are supported.</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');

        const SIZE = 8;
        const CELL = 50;
        const BOARD_X = 10;
        const BOARD_Y = 10;
        const BOARD_PX = SIZE * CELL;
        const BUTTON_Y = BOARD_Y + BOARD_PX + 12;
        const BUTTON_H = 44;
        const AI_DEPTH = 3;
        const PLAYER_COLOR = 'white';
        const AI_COLOR = 'black';

        const ORTHO_DIRS = [[-1, 0], [1, 0], [0, -1], [0, 1]];
        const DIAG_DIRS = [[-1, -1], [-1, 1], [1, -1], [1, 1]];
        const ALL8_DIRS = ORTHO_DIRS.concat(DIAG_DIRS);
        const KNIGHT_OFFSETS = [[-2, -1], [-2, 1], [2, -1], [2, 1], [-1, -2], [-1, 2], [1, -2], [1, 2]];
        const PIECE_VALUES = { pawn: 1, knight: 3, bishop: 3, rook: 5, queen: 9, king: 0 };
        const UNICODE = {
            white: { king: '♔', queen: '♕', rook: '♖', bishop: '♗', knight: '♘', pawn: '♙' },
            black: { king: '♚', queen: '♛', rook: '♜', bishop: '♝', knight: '♞', pawn: '♟' }
        };

        const BUTTONS = [{ label: 'New Game', x: (420 - 160) / 2, w: 160 }];

        let board, gameState, turn, gameOver, selected, legalDestinations, aiDelay;

        function inBounds(r, c) { return r >= 0 && r < SIZE && c >= 0 && c < SIZE; }
        function opponentOf(color) { return color === 'white' ? 'black' : 'white'; }

        function setupBoard() {
            const b = [];
            for (let r = 0; r < SIZE; r++) b.push(new Array(SIZE).fill(null));
            const backRank = ['rook', 'knight', 'bishop', 'queen', 'king', 'bishop', 'knight', 'rook'];
            for (let c = 0; c < SIZE; c++) {
                b[0][c] = { type: backRank[c], color: 'black' };
                b[1][c] = { type: 'pawn', color: 'black' };
                b[6][c] = { type: 'pawn', color: 'white' };
                b[7][c] = { type: backRank[c], color: 'white' };
            }
            return b;
        }

        function cloneBoard(b) {
            return b.map(row => row.map(cell => cell ? { ...cell } : null));
        }

        function cloneGameState(gs) {
            return {
                castlingRights: { white: { ...gs.castlingRights.white }, black: { ...gs.castlingRights.black } },
                enPassantTarget: gs.enPassantTarget ? { ...gs.enPassantTarget } : null
            };
        }

        function findKing(b, color) {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (b[r][c] && b[r][c].type === 'king' && b[r][c].color === color) return { r, c };
                }
            }
            return null;
        }

        function isSquareAttacked(b, r, c, byColor) {
            const pawnRow = byColor === 'white' ? r + 1 : r - 1;
            for (const pawnCol of [c - 1, c + 1]) {
                if (inBounds(pawnRow, pawnCol)) {
                    const p = b[pawnRow][pawnCol];
                    if (p && p.type === 'pawn' && p.color === byColor) return true;
                }
            }
            for (const [dr, dc] of KNIGHT_OFFSETS) {
                const nr = r + dr, nc = c + dc;
                if (inBounds(nr, nc)) {
                    const p = b[nr][nc];
                    if (p && p.type === 'knight' && p.color === byColor) return true;
                }
            }
            for (const [dr, dc] of ALL8_DIRS) {
                const nr = r + dr, nc = c + dc;
                if (inBounds(nr, nc)) {
                    const p = b[nr][nc];
                    if (p && p.type === 'king' && p.color === byColor) return true;
                }
            }
            for (const [dr, dc] of DIAG_DIRS) {
                let nr = r + dr, nc = c + dc;
                while (inBounds(nr, nc)) {
                    const p = b[nr][nc];
                    if (p) {
                        if (p.color === byColor && (p.type === 'bishop' || p.type === 'queen')) return true;
                        break;
                    }
                    nr += dr; nc += dc;
                }
            }
            for (const [dr, dc] of ORTHO_DIRS) {
                let nr = r + dr, nc = c + dc;
                while (inBounds(nr, nc)) {
                    const p = b[nr][nc];
                    if (p) {
                        if (p.color === byColor && (p.type === 'rook' || p.type === 'queen')) return true;
                        break;
                    }
                    nr += dr; nc += dc;
                }
            }
            return false;
        }

        function pseudoLegalMovesForPiece(b, r, c, gs) {
            const piece = b[r][c];
            if (!piece) return [];
            const color = piece.color;
            const moves = [];

            if (piece.type === 'pawn') {
                const dr = color === 'white' ? -1 : 1;
                const startRow = color === 'white' ? 6 : 1;
                const promoRow = color === 'white' ? 0 : 7;
                if (inBounds(r + dr, c) && !b[r + dr][c]) {
                    moves.push({ from: { r, c }, to: { r: r + dr, c }, promotion: r + dr === promoRow });
                    if (r === startRow && !b[r + 2 * dr][c]) {
                        moves.push({ from: { r, c }, to: { r: r + 2 * dr, c }, doubleStep: true });
                    }
                }
                for (const dc of [-1, 1]) {
                    const nr = r + dr, nc = c + dc;
                    if (!inBounds(nr, nc)) continue;
                    const target = b[nr][nc];
                    if (target && target.color !== color) {
                        moves.push({ from: { r, c }, to: { r: nr, c: nc }, capture: true, promotion: nr === promoRow });
                    } else if (gs.enPassantTarget && gs.enPassantTarget.r === nr && gs.enPassantTarget.c === nc) {
                        moves.push({ from: { r, c }, to: { r: nr, c: nc }, capture: true, enPassant: true });
                    }
                }
            } else if (piece.type === 'knight') {
                for (const [dr, dc] of KNIGHT_OFFSETS) {
                    const nr = r + dr, nc = c + dc;
                    if (inBounds(nr, nc) && (!b[nr][nc] || b[nr][nc].color !== color)) {
                        moves.push({ from: { r, c }, to: { r: nr, c: nc }, capture: !!b[nr][nc] });
                    }
                }
            } else if (piece.type === 'king') {
                for (const [dr, dc] of ALL8_DIRS) {
                    const nr = r + dr, nc = c + dc;
                    if (inBounds(nr, nc) && (!b[nr][nc] || b[nr][nc].color !== color)) {
                        moves.push({ from: { r, c }, to: { r: nr, c: nc }, capture: !!b[nr][nc] });
                    }
                }
                const opp = opponentOf(color);
                if (!isSquareAttacked(b, r, c, opp)) {
                    const rights = gs.castlingRights[color];
                    const row = color === 'white' ? 7 : 0;
                    if (rights.kingSide && !b[row][5] && !b[row][6] &&
                        b[row][7] && b[row][7].type === 'rook' && b[row][7].color === color &&
                        !isSquareAttacked(b, row, 5, opp) && !isSquareAttacked(b, row, 6, opp)) {
                        moves.push({ from: { r, c }, to: { r: row, c: 6 }, castle: 'king' });
                    }
                    if (rights.queenSide && !b[row][1] && !b[row][2] && !b[row][3] &&
                        b[row][0] && b[row][0].type === 'rook' && b[row][0].color === color &&
                        !isSquareAttacked(b, row, 3, opp) && !isSquareAttacked(b, row, 2, opp)) {
                        moves.push({ from: { r, c }, to: { r: row, c: 2 }, castle: 'queen' });
                    }
                }
            } else {
                const dirs = piece.type === 'bishop' ? DIAG_DIRS : piece.type === 'rook' ? ORTHO_DIRS : ALL8_DIRS;
                for (const [dr, dc] of dirs) {
                    let nr = r + dr, nc = c + dc;
                    while (inBounds(nr, nc)) {
                        if (!b[nr][nc]) {
                            moves.push({ from: { r, c }, to: { r: nr, c: nc } });
                        } else {
                            if (b[nr][nc].color !== color) moves.push({ from: { r, c }, to: { r: nr, c: nc }, capture: true });
                            break;
                        }
                        nr += dr; nc += dc;
                    }
                }
            }
            return moves;
        }

        function applyMove(b, gs, move) {
            const piece = b[move.from.r][move.from.c];
            const color = piece.color;

            if (move.enPassant) b[move.from.r][move.to.c] = null;

            b[move.from.r][move.from.c] = null;
            b[move.to.r][move.to.c] = piece;
            if (move.promotion) piece.type = 'queen';

            if (move.castle) {
                const row = move.from.r;
                if (move.castle === 'king') { b[row][5] = b[row][7]; b[row][7] = null; }
                else { b[row][3] = b[row][0]; b[row][0] = null; }
            }

            if (piece.type === 'king') {
                gs.castlingRights[color].kingSide = false;
                gs.castlingRights[color].queenSide = false;
            }
            if (move.from.r === 7 && move.from.c === 0) gs.castlingRights.white.queenSide = false;
            if (move.from.r === 7 && move.from.c === 7) gs.castlingRights.white.kingSide = false;
            if (move.from.r === 0 && move.from.c === 0) gs.castlingRights.black.queenSide = false;
            if (move.from.r === 0 && move.from.c === 7) gs.castlingRights.black.kingSide = false;
            if (move.to.r === 7 && move.to.c === 0) gs.castlingRights.white.queenSide = false;
            if (move.to.r === 7 && move.to.c === 7) gs.castlingRights.white.kingSide = false;
            if (move.to.r === 0 && move.to.c === 0) gs.castlingRights.black.queenSide = false;
            if (move.to.r === 0 && move.to.c === 7) gs.castlingRights.black.kingSide = false;

            gs.enPassantTarget = move.doubleStep ? { r: (move.from.r + move.to.r) / 2, c: move.from.c } : null;
        }

        function generateLegalMoves(b, gs, color) {
            const pseudo = [];
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const piece = b[r][c];
                    if (piece && piece.color === color) pseudo.push(...pseudoLegalMovesForPiece(b, r, c, gs));
                }
            }
            return pseudo.filter(mv => {
                const nb = cloneBoard(b);
                const ngs = cloneGameState(gs);
                applyMove(nb, ngs, mv);
                const kingPos = findKing(nb, color);
                return !isSquareAttacked(nb, kingPos.r, kingPos.c, opponentOf(color));
            });
        }

        function evaluate(b, aiColor) {
            let score = 0;
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const p = b[r][c];
                    if (!p) continue;
                    const val = PIECE_VALUES[p.type];
                    score += p.color === aiColor ? val : -val;
                }
            }
            return score;
        }

        function minimaxChess(b, gs, depth, alpha, beta, maximizing, aiColor, oppColor) {
            const color = maximizing ? aiColor : oppColor;
            const moves = generateLegalMoves(b, gs, color);

            if (moves.length === 0) {
                const kingPos = findKing(b, color);
                const inCheck = isSquareAttacked(b, kingPos.r, kingPos.c, opponentOf(color));
                if (!inCheck) return 0;
                return maximizing ? -1000 - depth : 1000 + depth;
            }
            if (depth === 0) return evaluate(b, aiColor);

            moves.sort((a, c) => (c.capture ? 1 : 0) - (a.capture ? 1 : 0));

            if (maximizing) {
                let best = -Infinity;
                for (const mv of moves) {
                    const nb = cloneBoard(b);
                    const ngs = cloneGameState(gs);
                    applyMove(nb, ngs, mv);
                    best = Math.max(best, minimaxChess(nb, ngs, depth - 1, alpha, beta, false, aiColor, oppColor));
                    alpha = Math.max(alpha, best);
                    if (beta <= alpha) break;
                }
                return best;
            } else {
                let best = Infinity;
                for (const mv of moves) {
                    const nb = cloneBoard(b);
                    const ngs = cloneGameState(gs);
                    applyMove(nb, ngs, mv);
                    best = Math.min(best, minimaxChess(nb, ngs, depth - 1, alpha, beta, true, aiColor, oppColor));
                    beta = Math.min(beta, best);
                    if (beta <= alpha) break;
                }
                return best;
            }
        }

        function chooseAiMove() {
            const moves = generateLegalMoves(board, gameState, AI_COLOR);
            moves.sort((a, c) => (c.capture ? 1 : 0) - (a.capture ? 1 : 0));
            let bestScore = -Infinity, bestMoves = [];
            for (const mv of moves) {
                const nb = cloneBoard(board);
                const ngs = cloneGameState(gameState);
                applyMove(nb, ngs, mv);
                const score = minimaxChess(nb, ngs, AI_DEPTH - 1, -Infinity, Infinity, false, AI_COLOR, PLAYER_COLOR);
                if (score > bestScore) { bestScore = score; bestMoves = [mv]; }
                else if (score === bestScore) bestMoves.push(mv);
            }
            return bestMoves[Math.floor(Math.random() * bestMoves.length)];
        }

        function setup() {
            board = setupBoard();
            gameState = { castlingRights: { white: { kingSide: true, queenSide: true }, black: { kingSide: true, queenSide: true } }, enPassantTarget: null };
            turn = PLAYER_COLOR;
            gameOver = false;
            selected = null;
            legalDestinations = [];
            aiDelay = 0;
            updateStatus();
        }

        function updateStatus() {
            const moves = generateLegalMoves(board, gameState, turn);
            const kingPos = findKing(board, turn);
            const inCheck = isSquareAttacked(board, kingPos.r, kingPos.c, opponentOf(turn));

            if (moves.length === 0) {
                gameOver = true;
                if (inCheck) statusEl.textContent = turn === PLAYER_COLOR ? 'Checkmate! AI wins.' : 'Checkmate! You win!';
                else statusEl.textContent = 'Stalemate. Draw.';
                return;
            }

            if (turn === PLAYER_COLOR) {
                statusEl.textContent = inCheck ? 'Check! Your turn.' : 'Your turn';
            } else {
                statusEl.textContent = inCheck ? "Check! AI's turn." : 'AI is thinking...';
                aiDelay = 20;
            }
        }

        function makeMove(move) {
            applyMove(board, gameState, move);
            turn = opponentOf(turn);
            selected = null;
            legalDestinations = [];
            updateStatus();
        }

        function handleSquareClick(r, c) {
            if (gameOver || turn !== PLAYER_COLOR) return;
            const piece = board[r][c];

            if (selected) {
                const move = legalDestinations.find(mv => mv.to.r === r && mv.to.c === c);
                if (move) { makeMove(move); return; }
                if (piece && piece.color === PLAYER_COLOR) {
                    selected = { r, c };
                    legalDestinations = generateLegalMoves(board, gameState, PLAYER_COLOR).filter(mv => mv.from.r === r && mv.from.c === c);
                    return;
                }
                selected = null;
                legalDestinations = [];
                return;
            }

            if (piece && piece.color === PLAYER_COLOR) {
                selected = { r, c };
                legalDestinations = generateLegalMoves(board, gameState, PLAYER_COLOR).filter(mv => mv.from.r === r && mv.from.c === c);
            }
        }

        function update() {
            if (gameOver || turn !== AI_COLOR) return;
            aiDelay--;
            if (aiDelay <= 0) {
                const move = chooseAiMove();
                if (move) makeMove(move);
            }
        }
    </script>
</body>
</html>
